name: Deploy to Production

on:
    push:
        tags:
            - "v*"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 20.x
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
                  cache: "npm"

            - name: Install Dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

            - name: Deploy to Vercel
              if: ${{ secrets.VERCEL_TOKEN != '' }}
              run: npx vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
              # Nota: Esto asume que el usuario configurará VERCEL_TOKEN si quiere despliegue manual desde CI
              # En la mayoría de los casos, Vercel lo hace automáticamente al detectar el push a GitHub.

            - name: Skip manual Vercel deploy
              if: ${{ secrets.VERCEL_TOKEN == '' }}
              run: echo "Skipping manual Vercel deploy because VERCEL_TOKEN is not configured. Vercel Git integration can still deploy repository pushes."

            - name: Notify Slack
              if: always()
              run: |
                  if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
                    curl -X POST -H 'Content-type: application/json' --data '{"text":"🚀 Deploy to production completed with status: ${{ job.status }}"}' ${{ secrets.SLACK_WEBHOOK }}
                  fi
